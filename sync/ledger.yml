# Provenance ledger: one entry per pool lecture (keyed lectures/<slug>.md)
# plus a top-level `assets:` map giving the content digest and source
# provenance for every pool asset. Asset/rewrite paths are relative to the
# pool root (lectures/); source `path` values are relative to
# mirror/<series>/lectures/.
# Every lecture `sources`/`divergent` item records the sha256 `digest` of
# that series' copy AS OF PROMOTION — the drift-check's baseline for
# telling fresh upstream movement from already-recorded divergence.
# `rewrites` is an ordered list of literal replacements: applying each
# {from -> to} in turn to the canonical mirror copy reproduces the pool
# copy byte-for-byte. Each pair is ONE non-rescanning pass with Python
# str.replace semantics: every occurrence present when its turn comes is
# replaced, but a pair's own output is never re-matched — a `from`
# embedded in its own `to` (e.g. an _admonition include) is applied
# exactly once, never to a fixpoint. The drift-check applies exactly
# this transform before comparing.
