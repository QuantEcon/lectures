# sync/manifest.yml — HUMAN INTENT
#
# The single source of truth for WHICH repositories feed the mirror, and which
# paths are taken from each. tools/sync reads this file (together with the
# machine-written sync/state.yml) to reconstruct mirror/<key>/.
#
# Adding a series later is a single stanza under `series`. Per-series overrides
# of `branch` or `paths` are allowed but not currently needed — every series
# uses the defaults below.
#
# Series are ordered by curriculum progression: intro -> programming ->
# intermediate -> advanced -> dp -> jax. (dp-test is a temporary test double,
# not part of the progression.)

defaults:
  branch: main
  paths:
    - lectures/
    - environment.yml

series:
  intro:
    repo: QuantEcon/lecture-python-intro
  programming:
    repo: QuantEcon/lecture-python-programming
  intermediate:
    repo: QuantEcon/lecture-python.myst
  advanced:
    repo: QuantEcon/lecture-python-advanced.myst
  dp:
    repo: QuantEcon/lecture-dp
  # TEST DOUBLE (M2 development only): a disposable public copy of lecture-dp
  # that we deliberately edit to exercise promotion/drift tooling — the live
  # repos stay read-only. Excluded from canonical-home consideration when the
  # real dp set is promoted; removed at the M3 switch-over. See its README.
  dp-test:
    repo: QuantEcon/lecture-dp.monorepo
  jax:
    repo: QuantEcon/lecture-jax
